<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d13" />
      <stop offset="100%" stop-color="#141923" />
    </linearGradient>
    
    <!-- Phoenix Gradient (Glowing Tech Orange) -->
    <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    
    <!-- Cyber Grid Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#222a3a" stroke-width="6" />
  
  <!-- Subtle Background Glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)" />
  
  <!-- Sleek Geometric Phoenix Symbol -->
  <g transform="translate(0, 10)">
    <!-- Central Head & Body (Flame Diamond) -->
    <path d="M 256 120 L 274 200 L 256 380 L 238 200 Z" fill="url(#phoenixGrad)" />
    
    <!-- Head Crest / Crown -->
    <path d="M 256 90 L 264 125 L 248 125 Z" fill="#fdba74" />
    
    <!-- Inner Wings (Left & Right) -->
    <path d="M 230 200 L 150 160 L 210 270 L 234 230 Z" fill="url(#phoenixGrad)" opacity="0.95" />
    <path d="M 282 200 L 362 160 L 302 270 L 278 230 Z" fill="url(#phoenixGrad)" opacity="0.95" />
    
    <!-- Outer Wing Sweeps (Sleek Geometric Ribbons) -->
    <path d="M 210 260 L 90 220 C 130 330 210 370 234 380 L 220 330 C 190 320 150 280 150 250 Z" fill="url(#phoenixGrad)" opacity="0.85" />
    <path d="M 302 260 L 422 220 C 382 330 302 370 278 380 L 290 330 C 320 320 360 280 360 250 Z" fill="url(#phoenixGrad)" opacity="0.85" />
    
    <!-- Tail Feathers / Flame base -->
    <path d="M 256 395 L 270 430 L 256 420 L 242 430 Z" fill="#ea580c" />
  </g>
</svg>
